name: mltp-langfuse

volumes:
  postgres_langfuse:
  clickhouse_data:
  minio_data:

services:

  # ── OBSERVABILITY BACKEND ─────────────────────────────────────────────────
  mimir:
    image: grafana/mimir:2.17.4
    command: ["-ingester.native-histograms-ingestion-enabled=true", "-config.file=/etc/mimir.yaml"]
    ports:
      - "9009:9009"
    volumes:
      - "./mimir/mimir.yaml:/etc/mimir.yaml"

  loki:
    image: grafana/loki:3.6.3
    command: ["--pattern-ingester.enabled=true", "-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - "./loki/loki.yaml:/etc/loki/loki.yaml"

  tempo:
    image: grafana/tempo:2.9.0
    ports:
      - "3200:3200"
      - "9411:9411"
      - "14250:14250"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - "./tempo/tempo.yaml:/etc/tempo.yaml"

  pyroscope:
    image: grafana/pyroscope:1.16.2
    ports:
      - "4040:4040"
    command: ["server"]

  # ── COLLECTOR ────────────────────────────────────────────────────────────
  alloy:
    image: grafana/alloy:v1.12.1
    ports:
      - "12350:12350"
      - "12347:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - "./alloy/config.alloy:/etc/alloy/config.alloy"
      - "./alloy/endpoints.json:/etc/alloy/endpoints.json"
    command: [
      "run",
      "--server.http.listen-addr=0.0.0.0:12345",
      "--stability.level=public-preview",
      "/etc/alloy/config.alloy",
    ]

  # ── GRAFANA ───────────────────────────────────────────────────────────────
  grafana:
    build: ./grafana
    ports:
      - "3000:3000"
    volumes:
      - "./grafana/definitions:/var/lib/grafana/dashboards"
      - "./grafana/provisioning:/etc/grafana/provisioning"
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=flameGraph traceqlSearch traceQLStreaming correlations metricsSummary traceqlEditor traceToMetrics traceToProfiles datatrails
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-langfuse}

  # ── LOAD GENERATOR ────────────────────────────────────────────────────────
  k6:
    image: grafana/k6:1.5.0
    restart: always
    volumes:
      - "./k6:/scripts"
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://mimir:9009/api/v1/push
      - K6_DURATION=3600s
      - K6_VUS=4
      - K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=true
    command: ["run", "-o", "experimental-prometheus-rw", "/scripts/mythical-loadtest.js"]

  trace-generator-k6:
    image: grafana/k6:1.5.0
    restart: unless-stopped
    depends_on:
      - trace-generator
    volumes:
      - "./k6:/scripts"
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://mimir:9009/api/v1/push
      - K6_DURATION=3600s
      - K6_VUS=2
      - K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=true
    command: ["run", "-o", "experimental-prometheus-rw", "/scripts/trace-generator-loadtest.js"]

  # ── BASES DE DATOS (LANGFUSE) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_langfuse:/var/lib/postgresql/data
      - ./langfuse-config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./langfuse-config/clickhouse/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user langfuse --password ${CLICKHOUSE_PASSWORD} --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-createbucket:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/langfuse-events"
    restart: "no"

  # ── LANGFUSE ──────────────────────────────────────────────────────────────
  langfuse-web:
    image: langfuse/langfuse:3
    depends_on:
      postgres:           { condition: service_healthy }
      clickhouse:         { condition: service_healthy }
      redis:              { condition: service_healthy }
      minio-createbucket: { condition: service_completed_successfully }
    ports:
      - "3002:3000"
    env_file: .env
    environment:
      DATABASE_URL:                 "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse"
      DIRECT_URL:                   "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse"
      CLICKHOUSE_MIGRATION_URL:     "clickhouse://langfuse:${CLICKHOUSE_PASSWORD}@clickhouse:9000/langfuse"
      CLICKHOUSE_URL:               "http://clickhouse:8123"
      CLICKHOUSE_USER:              langfuse
      CLICKHOUSE_PASSWORD:          ${CLICKHOUSE_PASSWORD}
      REDIS_HOST:                   redis
      REDIS_PORT:                   "6379"
      NEXTAUTH_URL:                 "http://localhost:3002"
      NEXTAUTH_SECRET:              ${LANGFUSE_NEXTAUTH_SECRET}
      SALT:                         ${LANGFUSE_SALT}
      ENCRYPTION_KEY:               ${LANGFUSE_ENCRYPTION_KEY}
      LANGFUSE_INIT_ORG_ID:         company-poc
      LANGFUSE_INIT_ORG_NAME:       company-poc
      LANGFUSE_INIT_PROJECT_ID:     poc
      LANGFUSE_INIT_PROJECT_NAME:   poc
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL:     admin@poc.local
      LANGFUSE_INIT_USER_PASSWORD:  admin123
      LANGFUSE_INIT_USER_NAME:      Admin
      TELEMETRY_ENABLED:            "false"
      LANGFUSE_LOG_LEVEL:           warn
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET:            langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION:            us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID:     ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT:          "http://minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE:  "true"

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      postgres:           { condition: service_healthy }
      clickhouse:         { condition: service_healthy }
      redis:              { condition: service_healthy }
      minio-createbucket: { condition: service_completed_successfully }
    env_file: .env
    environment:
      DATABASE_URL:             "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse"
      DIRECT_URL:               "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://langfuse:${CLICKHOUSE_PASSWORD}@clickhouse:9000/langfuse"
      CLICKHOUSE_URL:           "http://clickhouse:8123"
      CLICKHOUSE_USER:          langfuse
      CLICKHOUSE_PASSWORD:      ${CLICKHOUSE_PASSWORD}
      REDIS_HOST:               redis
      REDIS_PORT:               "6379"
      NEXTAUTH_SECRET:          ${LANGFUSE_NEXTAUTH_SECRET}
      SALT:                     ${LANGFUSE_SALT}
      ENCRYPTION_KEY:           ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED:        "false"
      LANGFUSE_LOG_LEVEL:       warn
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET:            langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION:            us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID:     ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT:          "http://minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE:  "true"

  # ── GENERADOR DE TRAZAS ───────────────────────────────────────────────────
  trace-generator:
    build: ./trace-generator
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST:       "http://langfuse-web:3000"
      NUM_TRACES:          "40"
      LOKI_URL:            "http://alloy:3100/loki/api/v1/push"
      OTLP_ENDPOINT:       "http://alloy:4318"
    depends_on:
      - langfuse-web
